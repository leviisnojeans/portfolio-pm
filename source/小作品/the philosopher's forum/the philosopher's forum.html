<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  display:flex;justify-content:center;align-items:stretch;
  background:var(--bg-warm);color:var(--text-primary);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;
}

:root{
  --bg-warm:#ede8df;
  --bg-warm2:#e6e0d6;
  --text-primary:#1c1c1e;
  --text-secondary:rgba(60,60,67,0.6);
  --text-tertiary:rgba(60,60,67,0.36);
  --glass-bg:rgba(255,255,255,0.56);
  --glass-border:1px solid rgba(255,255,255,0.45);
  --glass-shadow:0 2px 16px rgba(0,0,0,0.06);
  --glass-hi:inset 0 0.5px 0 rgba(255,255,255,0.7);
  --card-bg:rgba(255,255,255,0.5);
  --card-border:rgba(0,0,0,0.07);
  --radius-sm:10px;
  --radius-md:14px;
  --radius-lg:18px;
  --radius-xl:22px;
  --radius-full:9999px;
  --serif:Georgia,'Times New Roman',serif;
  --sans:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  --disp:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  --purple:#5E5CE6;
  --purple-grad:linear-gradient(135deg,#5E5CE6,#BF5AF2);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
  --shell-max:680px;
}

/* App shell */
#root{
  width:100%;height:100%;max-width:var(--shell-max);
  display:flex;flex-direction:column;
  padding-top:var(--safe-t);padding-bottom:var(--safe-b);
  padding-left:var(--safe-l);padding-right:var(--safe-r);
}
@media(min-width:720px){
  body{align-items:center;padding:16px 24px}
  #root{height:auto;min-height:0;max-height:calc(100vh - 32px);border-radius:var(--radius-xl);overflow:hidden;
    box-shadow:0 4px 40px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04)}
}

/* Transitions */
.phase-enter{animation:phaseIn .35s cubic-bezier(.4,0,.2,1) both}
@keyframes phaseIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-appear{animation:msgIn .28s cubic-bezier(.4,0,.2,1) both}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes heroPulse{0%,100%{transform:scale(1.02)}50%{transform:scale(1.07) translateY(-6px)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

/* Focus visible */
:focus-visible{outline:2px solid var(--purple);outline-offset:2px;border-radius:4px}
button:focus:not(:focus-visible){outline:none}

/* Reduced motion */
@media(prefers-reduced-motion:reduce){
  .phase-enter,.msg-appear{animation:none!important}
  @keyframes heroPulse{0%,100%{transform:none}}
}

/* Shared */
.glass{background:var(--glass-bg);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:var(--glass-border);box-shadow:var(--glass-shadow),var(--glass-hi)}
.cta-btn{display:block;width:100%;padding:14px 0;font-size:15.5px;font-weight:600;font-family:var(--disp);border-radius:var(--radius-md);border:none;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1)}
.cta-btn:active{transform:scale(.97)}
.chip{display:inline-flex;align-items:center;padding:5px 12px;font-size:12px;border-radius:var(--radius-full);border:1px solid rgba(0,0,0,.08);background:rgba(255,255,255,.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);color:var(--text-secondary);cursor:pointer;transition:all .15s;font-family:var(--sans);white-space:nowrap}
.chip:hover{background:rgba(255,255,255,.7);border-color:rgba(0,0,0,.13)}
.chip:active{transform:scale(.96)}
.icon-btn{display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:all .15s;background:none;padding:0}

/* ── INTRO ── */
.intro{position:relative;display:flex;flex-direction:column;height:100%;min-height:100dvh;overflow:hidden;background:var(--bg-warm)}
@media(min-width:720px){.intro{min-height:0;height:auto}}
.intro-hero{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.intro-hero img{width:100%;height:100%;object-fit:cover;object-position:center 28%;opacity:0;transition:opacity 2s;animation:heroPulse 26s ease-in-out infinite}
.intro-hero img.loaded{opacity:.38}
.intro-fallback{position:absolute;inset:0;background:linear-gradient(135deg,rgba(94,92,230,.06),rgba(191,90,242,.04))}
.intro-gradient{position:absolute;inset:0;background:linear-gradient(180deg,rgba(237,232,223,.15) 0%,rgba(237,232,223,.45) 40%,rgba(237,232,223,.92) 72%,var(--bg-warm) 100%);pointer-events:none}
.intro-content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:40px 20px 24px;max-width:460px;margin:0 auto;width:100%}
.intro-label{margin:0 0 8px;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-tertiary);font-weight:600}
.intro-title{margin:0 0 10px;font-size:clamp(28px,7vw,36px);font-weight:700;line-height:1.1;letter-spacing:-.025em;font-family:var(--disp);color:var(--text-primary)}
.intro-sub{margin:0 0 28px;font-size:14.5px;color:var(--text-secondary);line-height:1.72;font-style:italic;font-family:var(--serif);max-width:360px}
.intro-panel{width:100%;padding:16px;border-radius:var(--radius-lg);background:var(--glass-bg);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:var(--glass-border);box-shadow:var(--glass-shadow),var(--glass-hi)}
.intro-panel textarea{width:100%;padding:11px 14px;font-size:14.5px;line-height:1.6;border-radius:var(--radius-sm);border:1px solid rgba(0,0,0,.07);background:rgba(255,255,255,.55);color:var(--text-primary);resize:none;outline:none;font-family:var(--sans);margin-bottom:12px}
.intro-panel textarea::placeholder{color:var(--text-tertiary)}
.intro-samples{margin-top:14px}
.intro-samples-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary);margin:0 0 8px;font-weight:500}
.intro-samples-list{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.intro-err{color:#ff3b30;font-size:12.5px;margin:8px 0 0}

/* ── DEBATE ── */
.debate{display:flex;flex-direction:column;height:100%;flex:1;min-height:0;background:linear-gradient(180deg,#f0ede8,#e8e4de)}
@media(min-width:720px){.debate{flex:none;height:auto;min-height:500px;max-height:calc(100vh - 64px)}}

/* Header */
.d-header{display:flex;align-items:flex-start;gap:10px;padding:12px 14px 10px;background:rgba(240,237,232,.75);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:.5px solid rgba(0,0,0,.06);flex-shrink:0}
.d-back{width:30px;height:30px;border-radius:50%;background:rgba(94,92,230,.1);color:var(--purple);font-size:16px;font-weight:600;flex-shrink:0;margin-top:1px}
.d-header-info{flex:1;min-width:0}
.d-header-label{margin:0;font-size:9.5px;color:var(--text-tertiary);letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.d-header-topic{margin:2px 0 0;font-size:17px;font-weight:700;color:var(--text-primary);letter-spacing:-.015em;line-height:1.22;font-family:var(--disp);overflow:hidden;text-overflow:ellipsis}

/* Participant strip */
.d-strip{display:flex;gap:7px;padding:8px 14px;border-bottom:.5px solid rgba(0,0,0,.05);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.d-strip::-webkit-scrollbar{display:none}
.d-chip{flex:0 0 auto;display:flex;align-items:center;gap:7px;padding:5px 12px 5px 5px;border-radius:var(--radius-md);border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.5);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.03),inset 0 .5px 0 rgba(255,255,255,.6);transition:all .18s;font-family:var(--sans)}
.d-chip:hover{background:rgba(255,255,255,.72)}
.d-chip:active{transform:scale(.97)}
.d-chip-avatar{border-radius:50%;overflow:hidden;flex-shrink:0}
.d-chip-name{margin:0;font-size:11.5px;font-weight:700;color:var(--text-primary);white-space:nowrap}
.d-chip-school{margin:0;font-size:9.5px;color:var(--text-tertiary)}

/* Messages area */
.d-messages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 12px;display:flex;flex-direction:column;gap:14px;min-height:0;scroll-behavior:smooth}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}

/* Philosopher message */
.msg-p{display:flex;gap:9px;max-width:88%}
.msg-p-avatar{flex-shrink:0;margin-top:1px;border:none;background:none;cursor:pointer;padding:0}
.msg-p-avatar:hover{opacity:.8}
.msg-p-body{flex:1;min-width:0}
.msg-p-name{margin:0 0 4px;font-size:11.5px;font-weight:700}
.msg-p-bubble{padding:11px 14px;border-radius:4px 18px 18px 18px;background:var(--glass-bg);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:var(--glass-border);color:var(--text-primary);font-size:14.5px;line-height:1.82;box-shadow:0 1px 8px rgba(0,0,0,.04),var(--glass-hi);font-family:var(--serif);user-select:text;-webkit-user-select:text}
.msg-p-reply{margin-top:5px;padding:2px 10px;font-size:10.5px;border-radius:var(--radius-sm);border:1px solid rgba(0,0,0,.07);background:transparent;color:var(--text-tertiary);font-family:var(--sans);cursor:pointer;transition:all .14s}
.msg-p-reply:hover{background:rgba(0,0,0,.04)}

/* User message */
.msg-u{display:flex;justify-content:flex-end;max-width:75%;margin-left:auto}
.msg-u-inner{max-width:100%}
.msg-u-to{text-align:right;font-size:10.5px;color:var(--text-tertiary);margin:0 0 2px}
.msg-u-bubble{padding:10px 14px;border-radius:18px 18px 4px 18px;background:var(--purple);color:#fff;font-size:14px;line-height:1.72}
.msg-u-quote{margin-bottom:7px;padding-left:9px;border-left:2px solid rgba(255,255,255,.35);font-size:11.5px;color:rgba(255,255,255,.62);font-style:italic;line-height:1.5}

/* Typing indicator */
.msg-typing{display:flex;gap:9px;opacity:.55}
.msg-typing-dot{width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text-tertiary)}
.msg-typing-bubble{padding:11px 14px;border-radius:4px 18px 18px 18px;background:var(--glass-bg);backdrop-filter:blur(16px);border:var(--glass-border);color:var(--text-tertiary);font-size:13.5px;font-style:italic;font-family:var(--serif);box-shadow:var(--glass-shadow)}
.typing-dots span{animation:dotPulse 1.4s ease-in-out infinite;display:inline-block}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* Quote popup */
.quote-popup{display:flex;justify-content:center;padding:4px 0}
.quote-popup button{padding:7px 16px;font-size:12.5px;font-weight:600;border-radius:var(--radius-full);border:none;background:var(--text-primary);color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.18);font-family:var(--sans);transition:all .15s}
.quote-popup button:hover{filter:brightness(1.1)}
.quote-popup button:active{transform:scale(.95)}

/* Composer */
.d-composer{padding:8px 14px calc(10px + var(--safe-b));border-top:.5px solid rgba(0,0,0,.05);background:rgba(240,237,232,.75);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);flex-shrink:0}
.d-reply-bar{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding:7px 11px;border-radius:var(--radius-sm);animation:fadeIn .15s ease both}
.d-reply-bar-avatar{border-radius:50%;overflow:hidden;flex-shrink:0}
.d-reply-bar-info{flex:1;min-width:0}
.d-reply-bar-name{margin:0;font-size:11.5px;font-weight:600}
.d-reply-bar-quote{margin:0;font-size:10.5px;color:var(--text-tertiary);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-reply-bar-close{background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:18px;line-height:1;padding:0;flex-shrink:0}
.d-composer-row{display:flex;gap:8px;align-items:center}
.d-composer-input{flex:1;padding:11px 15px;font-size:14.5px;border-radius:var(--radius-full);border:var(--glass-border);background:var(--glass-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);color:var(--text-primary);outline:none;font-family:var(--sans);box-shadow:0 1px 5px rgba(0,0,0,.03),var(--glass-hi);transition:border-color .15s}
.d-composer-input::placeholder{color:var(--text-tertiary)}
.d-composer-input:focus{border-color:rgba(94,92,230,.35)}
.d-send{width:40px;height:40px;border-radius:50%;flex-shrink:0;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.d-send:active{transform:scale(.9)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.32);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);animation:fadeIn .2s ease both}
.modal-card{width:330px;max-width:88vw;max-height:90dvh;overflow-y:auto;border-radius:28px;background:rgba(255,255,255,.75);backdrop-filter:blur(60px);-webkit-backdrop-filter:blur(60px);border:1px solid rgba(255,255,255,.5);box-shadow:0 24px 80px rgba(0,0,0,.18),inset 0 .5px 0 rgba(255,255,255,.8);animation:scaleIn .25s cubic-bezier(.4,0,.2,1) both}
.modal-header{padding:24px 24px 20px;display:flex;align-items:center;gap:14px}
.modal-header-avatar{background:rgba(255,255,255,.18);border-radius:50%;padding:3px;border:2px solid rgba(255,255,255,.35);flex-shrink:0}
.modal-header-info{flex:1}
.modal-header-name{margin:0 0 2px;font-size:21px;font-weight:700;color:#fff;font-family:var(--serif);letter-spacing:-.02em}
.modal-header-school{margin:0;font-size:13px;color:rgba(255,255,255,.78);font-weight:500}
.modal-close{align-self:flex-start;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.22);color:#fff;font-size:13px;flex-shrink:0}
.modal-close:hover{background:rgba(255,255,255,.35)}
.modal-body{padding:16px 22px 22px}
.modal-bio{margin:0 0 14px;font-size:13.5px;color:var(--text-secondary);line-height:1.72;font-style:italic;font-family:var(--serif)}
.modal-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-field{padding:8px 12px;border-radius:14px;background:rgba(0,0,0,.025);border:1px solid rgba(0,0,0,.05)}
.modal-field-label{margin:0;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-tertiary);font-weight:600}
.modal-field-value{margin:2px 0 0;font-size:13px;font-weight:600}
.modal-work{margin-top:8px;padding:8px 12px;border-radius:14px;background:rgba(0,0,0,.025);border:1px solid rgba(0,0,0,.05)}
.modal-work-label{margin:0;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-tertiary);font-weight:600}
.modal-work-title{margin:2px 0 0;font-size:13px;color:var(--text-primary);font-weight:600;font-style:italic}
</style>
</head>

  "Arthur Schopenhauer":["Desire fulfilled only breeds new desire. Suffering is the structure of existence driven by the Will.","The wisest path is denial of the Will: through art, compassion, and ascetic renunciation of craving.","Optimism is a cruel lie. Every satisfaction gives way to boredom, and every boredom to fresh craving.","Pity is genuine morality's basis. We suffer together as expressions of the same blind Will."],

  "William James":["Truth is what happens to an idea when it works, when it leads us through experience.","A difference that makes no difference is no difference. Philosophy must cash out in life.","Believe that life is worth living, and your belief will help create the fact.","Human beings can alter their lives by altering their attitudes. This is the greatest revolution."],

  "Friedrich Nietzsche":["What does not kill us makes us stronger — but only if we impose meaning on the suffering.","God is dead. We killed him. The task now is to create values without trembling.","The Übermensch transforms suffering through creation. Pain is material, not the enemy.","Eternal recurrence: live as if you would choose this life again, infinitely. The highest affirmation."],
  "Aristotle":["Virtue is the mean between excess and deficiency. Courage lies between cowardice and recklessness.","We are political animals. The good life requires friendship, community, and the polis.","Our unique function is to exercise reason in accordance with virtue over a complete lifetime.","Happiness is not a feeling but a quality of activity — our highest capacities in excellent action."],
  "René Descartes":["What I perceive clearly and distinctly is true. Clarity marks knowledge, not sensation.","The mind is distinct from the body. I am essentially a res cogitans — a thinking thing.","Even if a demon deceived me, the act of being deceived proves that I exist and think.","Mathematics models all knowledge: build on foundations, advance only through necessity."],
  "David Hume":["Reason is the slave of the passions. No ought can be derived from is alone.","Causation is habit, not necessity. We observe conjunction and project connection.","Our beliefs about the future rest on custom — the assumption nature stays uniform, which we cannot prove.","Sympathy transmits feelings between minds. Morality is grounded in sentiment, not pure reason."],
  "Immanuel Kant":["Two things fill me with awe: the starry sky above and the moral law within me.","Treat humanity — in yourself and every person — always as an end, never merely as means.","Experience without concepts is blind; concepts without experience empty. Both are necessary.","The mind does not conform to objects — objects conform to the mind. That is my revolution."],
  "Plato":["Opinion concerns appearance; knowledge concerns the eternal Forms — distinct faculties entirely.","Justice is each part of the soul performing its function: reason ruling, spirit supporting, appetite obeying.","The philosopher freed from the cave must return to lead others toward the light.","Beauty is the Good breaking through into the sensory world. Love of beauty is love of truth."],
  "Socrates":["I cannot teach anybody anything — I can only make them think. My method is midwifery of ideas.","An unexamined assumption is the most dangerous kind. Tell me what you mean; let us test it.","The only genuine wisdom is knowing you know nothing. The only honest beginning for inquiry.","Care for your soul above all else. Wealth, reputation, pleasure — none matter if the soul is neglected."],
  "John Locke":["The mind at birth is a blank slate. Experience alone writes upon it — including our identity.","Consent is the only legitimate basis of political authority. Without it, government is usurpation.","Toleration is demanded by belief's nature. Faith forced is not faith at all.","Property is labor made tangible: what we mix our effort with becomes ours by natural law."],
  "Søren Kierkegaard":["Subjectivity is truth. No system captures the passionate inwardness of a single existing individual.","Anxiety is the dizziness of freedom — infinite possibility pressing upon a finite self.","The leap of faith is the only honest response when reason reaches its limit.","We live forwards but understand backwards. Existence is irreducibly narrative, ungrasped by any system."],
  "Blaise Pascal":["The heart has its reasons which reason knows nothing of. Faith is a deeper knowing.","Man is a thinking reed, the weakest in nature. Greatness lies in knowing our fragility.","All unhappiness comes from one thing: the inability to sit quietly alone in a room.","The infinite spaces terrify me — but reveal our dignity, for we alone know we are finite."],
};

const voice=(n,s)=>{const p=V[n]||["The question demands patient examination.","Let us not mistake urgency for permission to answer carelessly.","Every inquiry begins by dissolving false certainties.","I would rather sit with a hard question than rush to a comfortable answer."];return p[(s+n.length)%p.length];};

const mockStart=async t=>{await wait(1800+Math.random()*600);const lc=t.toLowerCase();const tp=TOPICS.find(x=>x.m.some(k=>lc.includes(k)));return tp?tp.p:DFLT;};
const mockReply=async(q,ps)=>{await wait(1300+Math.random()*500);return ps.map(p=>({name:p.name,reply:voice(p.name,q.length)}));};

/* ── PROFILE MODAL ── */
function Modal({phil:p,onClose}){
  const cardRef=useRef(null);
  useEffect(()=>{
    if(!p)return;
    const prev=document.activeElement;
    const card=cardRef.current;
    if(card){const f=card.querySelector('button');if(f)f.focus();}
    const h=e=>{if(e.key==="Escape")onClose();};
    document.addEventListener("keydown",h);
    return()=>{document.removeEventListener("keydown",h);if(prev&&prev.focus)prev.focus();};
  },[p,onClose]);
  if(!p)return null;
  return React.createElement("div",{className:"modal-overlay",onClick:onClose,"aria-label":"Close profile","aria-modal":"true",role:"dialog"},
    React.createElement("div",{ref:cardRef,className:"modal-card",onClick:e=>e.stopPropagation()},
      React.createElement("div",{className:"modal-header",style:{background:p.col.g}},
        React.createElement("div",{className:"modal-header-avatar"},
          React.createElement(Face,{name:p.name,size:52,color:"#fff"})
        ),
        React.createElement("div",{className:"modal-header-info"},
          React.createElement("h2",{className:"modal-header-name"},p.name),
          React.createElement("p",{className:"modal-header-school"},p.school)
        ),
        React.createElement("button",{className:"icon-btn modal-close",onClick:onClose,"aria-label":"Close profile"},"✕")
      ),
      React.createElement("div",{className:"modal-body"},
        React.createElement("p",{className:"modal-bio"},p.bio),
        React.createElement("div",{className:"modal-fields"},
          [["Era",p.era,T.text.primary],["Stance",p.stance,p.col.m]].map(([l,v,c])=>
            React.createElement("div",{key:l,className:"modal-field"},
              React.createElement("p",{className:"modal-field-label"},l),
              React.createElement("p",{className:"modal-field-value",style:{color:c}},v)
            )
          )
        ),
        React.createElement("div",{className:"modal-work"},
          React.createElement("p",{className:"modal-work-label"},"Key Work"),
          React.createElement("p",{className:"modal-work-title"},p.work)
        )
      )
    )
  );
}

/* ── APP ── */
function App(){
  const [phase,setPhase]=useState("intro");
  const [topic,setTopic]=useState("");
  const [philosophers,setPhilosophers]=useState([]);
  const [messages,setMessages]=useState([]);
  const [input,setInput]=useState("");
  const [replyTarget,setReplyTarget]=useState(null);
  const [quotedText,setQuotedText]=useState(null);
  const [busy,setBusy]=useState(false);
  const [loadingMsg,setLoadingMsg]=useState("");
  const [error,setError]=useState("");
  const [profile,setProfile]=useState(null);
  const [selection,setSelection]=useState(null);
  const [heroLoaded,setHeroLoaded]=useState(false);

  const bottomRef=useRef(null);
  const inputRef=useRef(null);
  const typeRef=useRef(null);
  const msRef=useRef(messages);
  useEffect(()=>{msRef.current=messages;},[messages]);
  useEffect(()=>{bottomRef.current&&bottomRef.current.scrollIntoView({behavior:"smooth"});},[messages,busy]);

  /* Text selection for quote-reply */
  useEffect(()=>{
    if(phase!=="debate")return;
    let timer;
    const handler=()=>{
      clearTimeout(timer);
      timer=setTimeout(()=>{
        const sel=window.getSelection();
        if(!sel||sel.isCollapsed){setSelection(null);return;}
        const text=sel.toString().trim();
        if(!text||text.length<4){setSelection(null);return;}
        const node=sel.getRangeAt(0).commonAncestorContainer;
        const el=node.nodeType===3?node.parentElement:node;
        const bubble=el.closest("[data-msg-idx]");
        if(!bubble){setSelection(null);return;}
        const idx=parseInt(bubble.dataset.msgIdx);
        const msg=msRef.current[idx];
        if(!msg||msg.k!=="p"){setSelection(null);return;}
        setSelection({text,philosopher:msg.p,idx});
      },80);
    };
    document.addEventListener("mouseup",handler);
    document.addEventListener("touchend",handler);
    return()=>{document.removeEventListener("mouseup",handler);document.removeEventListener("touchend",handler);clearTimeout(timer);};
  },[phase]);

  /* Escape clears reply state */
  useEffect(()=>{
    const h=e=>{if(e.key==="Escape"&&!profile){setReplyTarget(null);setQuotedText(null);setSelection(null);}};
    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[profile]);

  const typeQuestion=useCallback(q=>{
    if(typeRef.current)clearInterval(typeRef.current);
    setTopic("");let i=0;
    const d=Math.max(18,3000/q.length);
    typeRef.current=setInterval(()=>{i++;setTopic(q.slice(0,i));if(i>=q.length)clearInterval(typeRef.current);},d);
  },[]);

  const startDebate=async()=>{
    if(!topic.trim()||busy)return;
    setBusy(true);setError("");setLoadingMsg("Finding the right minds\u2026");
    try{
      const raw=await mockStart(topic.trim());
      const enriched=raw.slice(0,4).map((p,i)=>({...p,col:C[i%C.length]}));
      setPhilosophers(enriched);setMessages([]);
      enriched.forEach((p,i)=>setTimeout(()=>setMessages(v=>[...v,{k:"p",p,text:p.open,opening:true}]),i*400));
      setPhase("debate");
      setTimeout(()=>inputRef.current&&inputRef.current.focus(),200);
    }catch(e){setError(e.message);}
    setBusy(false);setLoadingMsg("");
  };

  const sendMessage=async()=>{
    if(!input.trim()||busy)return;
    const text=input.trim();setInput("");setBusy(true);
    const targets=replyTarget?[replyTarget]:philosophers;
    const toName=replyTarget?replyTarget.name:null;
    const quote=quotedText;
    setMessages(v=>[...v,{k:"u",text,to:toName,qt:quote}]);
    setReplyTarget(null);setQuotedText(null);setSelection(null);
    setLoadingMsg(toName?`${toName.split(" ")[0]} is thinking\u2026`:`All ${targets.length} are thinking\u2026`);
    try{
      const res=await mockReply(text,targets);
      for(let i=0;i<res.length;i++){
        const r=res[i];
        const p=philosophers.find(x=>x.name===r.name)||targets[0];
        await new Promise(resolve=>setTimeout(resolve,300));
        setMessages(v=>[...v,{k:"p",p,text:r.reply}]);
      }
    }catch(e){setMessages(v=>[...v,{k:"e",text:e.message}]);}
    setBusy(false);setLoadingMsg("");
    setTimeout(()=>inputRef.current&&inputRef.current.focus(),50);
  };

  const quoteAndReply=()=>{
    if(!selection)return;
    setReplyTarget(selection.philosopher);
    setQuotedText(selection.text);
    setSelection(null);
    window.getSelection()&&window.getSelection().removeAllRanges();
    inputRef.current&&inputRef.current.focus();
  };

  const clearReplyState=()=>{setReplyTarget(null);setQuotedText(null);};

  /* ── RENDER: INTRO ── */
  if(phase==="intro") return React.createElement("div",{className:"intro phase-enter"},
    React.createElement("div",{className:"intro-hero"},
      React.createElement("img",{src:HERO,alt:"",onLoad:()=>setHeroLoaded(true),className:heroLoaded?"loaded":"",style:{opacity:heroLoaded?undefined:0}}),
      !heroLoaded&&React.createElement("div",{className:"intro-fallback"})
    ),
    React.createElement("div",{className:"intro-gradient"}),
    React.createElement("div",{className:"intro-content"},
      React.createElement("p",{className:"intro-label",style:{animation:"fadeIn .5s ease .05s both"}},"The Philosopher's Forum"),
      React.createElement("h1",{className:"intro-title",style:{animation:"fadeIn .5s ease .15s both"}},"Dead minds.",React.createElement("br"),"Living questions."),
      React.createElement("p",{className:"intro-sub",style:{animation:"fadeIn .5s ease .25s both"}},"Every answer you need lives in the minds of those who died asking the same question."),
      React.createElement("div",{className:"intro-panel",style:{animation:"fadeIn .5s ease .35s both"}},
        React.createElement("textarea",{autoFocus:true,value:topic,onChange:e=>setTopic(e.target.value),onKeyDown:e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();startDebate();}},"aria-label":"Your philosophical question",placeholder:"Pose your question to the ages\u2026",rows:2}),
        React.createElement("button",{className:"cta-btn",onClick:startDebate,disabled:!topic.trim()||busy,"aria-label":busy?loadingMsg||"Loading":"Open the Forum",
          style:{background:topic.trim()&&!busy?"linear-gradient(135deg,#5E5CE6,#BF5AF2)":"rgba(0,0,0,.05)",color:topic.trim()&&!busy?"#fff":T.text.tertiary,boxShadow:topic.trim()&&!busy?"0 6px 24px rgba(94,92,230,.34)":"none"}
        },busy?loadingMsg||"Summoning\u2026":"Open the Forum \u2192"),
        React.createElement("div",{className:"intro-samples"},
          React.createElement("p",{className:"intro-samples-label"},"Or explore"),
          React.createElement("div",{className:"intro-samples-list"},
            SAMPLES.map(s=>React.createElement("button",{key:s,className:"chip",onClick:()=>typeQuestion(s),"aria-label":`Ask: ${s}`},s))
          )
        )
      ),
      error&&React.createElement("p",{className:"intro-err",role:"alert"},error)
    )
  );

  /* ── RENDER: DEBATE ── */
  return React.createElement("div",{className:"debate phase-enter"},
    React.createElement(Modal,{phil:profile,onClose:()=>setProfile(null)}),

    /* Header */
    React.createElement("div",{className:"d-header"},
      React.createElement("button",{className:"icon-btn d-back",onClick:()=>{setPhase("intro");setMessages([]);setPhilosophers([]);setReplyTarget(null);setQuotedText(null);setSelection(null);setError("");setTopic("");},"aria-label":"Back to intro"},"←"),
      React.createElement("div",{className:"d-header-info"},
        React.createElement("p",{className:"d-header-label"},"Debating"),
        React.createElement("h2",{className:"d-header-topic"},topic)
      )
    ),

    /* Participant strip */
    React.createElement("div",{className:"d-strip",role:"list","aria-label":"Debate participants"},
      philosophers.map(p=>React.createElement("button",{key:p.name,className:"d-chip",onClick:()=>setProfile(p),role:"listitem","aria-label":`View ${p.name}'s profile`},
        React.createElement("div",{className:"d-chip-avatar",style:{border:`1.5px solid ${p.col.b}`}},
          React.createElement(Face,{name:p.name,size:28,color:p.col.m})
        ),
        React.createElement("div",null,
          React.createElement("p",{className:"d-chip-name"},p.name),
          React.createElement("p",{className:"d-chip-school"},p.school)
        )
      ))
    ),

    /* Messages */
    React.createElement("div",{className:"d-messages"},
      messages.map((m,i)=>{
        if(m.k==="e")return React.createElement("p",{key:i,style:{textAlign:"center",fontSize:12.5,color:"#ff3b30",margin:0},role:"alert"},m.text);
        if(m.k==="u")return React.createElement("div",{key:i,className:"msg-u msg-appear"},
          React.createElement("div",{className:"msg-u-inner"},
            m.to&&React.createElement("p",{className:"msg-u-to"},"\u2197 ",m.to),
            React.createElement("div",{className:"msg-u-bubble"},
              m.qt&&React.createElement("div",{className:"msg-u-quote"},'\u201c',m.qt,'\u201d'),
              m.text
            )
          )
        );
        return React.createElement("div",{key:i,className:"msg-p msg-appear"},
          React.createElement("button",{className:"msg-p-avatar",onClick:()=>setProfile(m.p),"aria-label":`View ${m.p.name}'s profile`},
            React.createElement("div",{style:{borderRadius:"50%",border:`1.5px solid ${m.p.col.b}`,overflow:"hidden"}},
              React.createElement(Face,{name:m.p.name,size:34,color:m.p.col.m})
            )
          ),
          React.createElement("div",{className:"msg-p-body"},
            React.createElement("p",{className:"msg-p-name",style:{color:m.p.col.m}},m.p.name),
            React.createElement("div",{"data-msg-idx":i,className:"msg-p-bubble"},m.text),
            React.createElement("button",{className:"msg-p-reply",onClick:()=>{setReplyTarget(m.p);inputRef.current&&inputRef.current.focus();},"aria-label":`Reply to ${m.p.name}`},"↩ Reply")
          )
        );
      }),
      busy&&React.createElement("div",{className:"msg-typing msg-appear"},
        React.createElement("div",{className:"msg-typing-dot"},"…"),
        React.createElement("div",{className:"msg-typing-bubble"},
          loadingMsg||React.createElement("span",{className:"typing-dots"},React.createElement("span",null,"."),React.createElement("span",null,"."),React.createElement("span",null,"."))
        )
      ),
      selection&&React.createElement("div",{className:"quote-popup"},
        React.createElement("button",{onClick:quoteAndReply},"↩ Quote & reply to ",selection.philosopher.name.split(" ").pop())
      ),
      React.createElement("div",{ref:bottomRef})
    ),

    /* Composer */
    React.createElement("div",{className:"d-composer"},
      (replyTarget||quotedText)&&React.createElement("div",{className:"d-reply-bar",style:{background:replyTarget?replyTarget.col.l:"rgba(0,0,0,.03)",border:`1px solid ${replyTarget?replyTarget.col.b:"rgba(0,0,0,.06)"}`}},
        replyTarget&&React.createElement("div",{className:"d-reply-bar-avatar"},
          React.createElement(Face,{name:replyTarget.name,size:18,color:replyTarget.col.m})
        ),
        React.createElement("div",{className:"d-reply-bar-info"},
          replyTarget&&React.createElement("p",{className:"d-reply-bar-name",style:{color:replyTarget.col.m}},"Replying to ",replyTarget.name),
          quotedText&&React.createElement("p",{className:"d-reply-bar-quote"},'\u201c',quotedText,'\u201d')
        ),
        React.createElement("button",{className:"icon-btn d-reply-bar-close",onClick:clearReplyState,"aria-label":"Cancel reply"},"✕")
      ),
      React.createElement("div",{className:"d-composer-row"},
        React.createElement("input",{ref:inputRef,value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}},
          placeholder:replyTarget?`Reply to ${replyTarget.name.split(" ")[0]}\u2026`:"Continue the inquiry\u2026",
          "aria-label":"Your message",className:"d-composer-input"}),
        React.createElement("button",{className:"icon-btn d-send",onClick:sendMessage,disabled:!input.trim()||busy,"aria-label":"Send message",
          style:{background:input.trim()&&!busy?"linear-gradient(135deg,#5E5CE6,#BF5AF2)":"rgba(0,0,0,.06)",color:input.trim()&&!busy?"#fff":T.text.tertiary,boxShadow:input.trim()&&!busy?"0 4px 14px rgba(94,92,230,.32)":"none"}
        },"↑")
      )
    )
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App,null));
</script>
</body>
</html>
