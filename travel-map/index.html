<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Levi's Travel Map</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --ink:#101214;
      --paper:#f6f3ed;
      --paper-2:#fbfcfd;
      --mist:#eef4f9;
      --muted:#68717b;
      --line:rgba(16,18,20,.1);
      --blue:#0071e3;
      --gold:#b98a52;
      --glass:rgba(255,255,255,.72);
      --shadow:0 24px 80px rgba(18,24,30,.14);
      --radius:24px;
    }
    html{scroll-behavior:smooth;background:#e5e2da}
    body{
      min-height:100vh;
      background:
        radial-gradient(circle at 78% 0%,rgba(255,255,255,.88),transparent 32%),
        radial-gradient(circle at 18% 100%,rgba(216,226,210,.82),transparent 38%),
        linear-gradient(135deg,#f8f4ea 0%,#eef5fb 54%,#e6e8df 100%);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(0,0,0,.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,0,0,.025) 1px,transparent 1px);
      background-size:48px 48px;
      mask-image:linear-gradient(to bottom,rgba(0,0,0,.55),transparent 76%);
      z-index:-1;
    }
    button,input{font:inherit}
    button{cursor:pointer;border:none;background:none}
    .serif{font-family:Georgia,"Times New Roman","Songti SC",serif}
    .hs{scrollbar-width:none}
    .hs::-webkit-scrollbar{display:none}

    .app-shell{min-height:100vh;padding-bottom:104px}
    .top-actions{
      position:fixed;
      top:calc(env(safe-area-inset-top,0px) + 14px);
      right:16px;
      z-index:120;
      display:flex;
      gap:8px;
    }
    .icon-btn{
      width:42px;
      height:42px;
      display:grid;
      place-items:center;
      border-radius:15px;
      color:var(--ink);
      background:rgba(255,255,255,.68);
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 12px 32px rgba(55,70,86,.1);
      position:relative;
    }
    .badge{
      position:absolute;
      top:-4px;
      right:-4px;
      min-width:17px;
      height:17px;
      padding:0 5px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:var(--gold);
      color:#111;
      font-size:10px;
      font-weight:900;
    }

    .hero{
      min-height:100vh;
      display:grid;
      grid-template-rows:auto 1fr;
      padding:calc(env(safe-area-inset-top,0px) + 26px) 18px 24px;
    }
    .brand-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding-right:104px;
      min-height:42px;
    }
    .brand{
      font-size:19px;
      letter-spacing:-.03em;
      font-weight:900;
      line-height:1;
    }
    .hero-grid{
      align-self:center;
      width:min(1180px,100%);
      margin:0 auto;
      display:grid;
      grid-template-columns:minmax(0,1.02fr) minmax(320px,.98fr);
      gap:22px;
      align-items:stretch;
    }
    .cover-card{
      min-height:520px;
      border-radius:32px;
      color:#fff;
      overflow:hidden;
      position:relative;
      background:
        linear-gradient(to top,rgba(0,0,0,.86),rgba(0,0,0,.1) 62%),
        linear-gradient(135deg,#17324b 0%,#6f5137 46%,#15191f 100%);
      box-shadow:var(--shadow);
    }
    .cover-card::after{
      content:"";
      position:absolute;
      inset:0;
      opacity:.35;
      background:linear-gradient(120deg,rgba(255,255,255,.16),transparent 34%),radial-gradient(circle at 28% 24%,rgba(255,255,255,.22),transparent 22%);
    }
    .cover-copy{
      position:absolute;
      left:clamp(24px,4vw,44px);
      right:clamp(24px,4vw,44px);
      bottom:clamp(28px,4vw,44px);
      z-index:1;
    }
    .eyebrow{
      font-size:10px;
      letter-spacing:.28em;
      text-transform:uppercase;
      color:rgba(255,255,255,.66);
      font-weight:900;
    }
    .cover-title{
      margin-top:14px;
      font-size:clamp(58px,10vw,116px);
      line-height:.82;
      letter-spacing:-.075em;
      font-weight:700;
    }
    .cover-copy p{
      margin-top:18px;
      color:rgba(255,255,255,.76);
      font-size:15px;
      line-height:1.7;
      max-width:430px;
    }

    .planner-column{
      display:grid;
      grid-template-rows:auto 1fr;
      grid-template-columns:minmax(0,1fr);
      gap:16px;
      min-width:0;
    }
    .glass-panel{
      border-radius:32px;
      background:var(--glass);
      backdrop-filter:blur(30px);
      -webkit-backdrop-filter:blur(30px);
      border:1px solid rgba(255,255,255,.78);
      box-shadow:0 24px 68px rgba(57,73,92,.12),0 1px 0 rgba(255,255,255,.9) inset;
    }
    .month-panel{padding:26px}
    .panel-label{
      font-size:11px;
      letter-spacing:.26em;
      text-transform:uppercase;
      color:#747a80;
      font-weight:900;
    }
    .month-panel h2{
      margin-top:8px;
      font-size:clamp(28px,4vw,48px);
      line-height:.94;
      letter-spacing:-.07em;
      max-width:100%;
    }
    .month-tabs{
      display:flex;
      gap:8px;
      overflow-x:auto;
      padding-top:20px;
    }
    .month-tab{
      flex:0 0 auto;
      min-width:62px;
      height:58px;
      border-radius:18px;
      display:grid;
      place-items:center;
      background:#fff;
      color:#929aa5;
      box-shadow:0 10px 24px rgba(56,74,94,.08);
      font-size:11px;
      font-weight:900;
      line-height:1.15;
    }
    .month-tab.active{background:#111;color:#fff}
    .featured-shell{
      display:grid;
      grid-template-rows:auto 1fr;
      gap:12px;
    }
    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:0 4px;
    }
    .section-head h2{
      font-size:22px;
      letter-spacing:-.05em;
    }
    .text-btn{
      height:34px;
      border-radius:999px;
      padding:0 14px;
      font-size:12px;
      font-weight:800;
      background:rgba(255,255,255,.7);
      box-shadow:0 1px 0 rgba(255,255,255,.85) inset;
      color:#4f5963;
    }
    .featured-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
    }
    .feature-card{
      min-height:232px;
      border-radius:24px;
      overflow:hidden;
      position:relative;
      color:#fff;
      background:
        linear-gradient(to top,rgba(0,0,0,.7),rgba(0,0,0,.04) 62%),
        linear-gradient(135deg,#8fc7de 0%,#f6efe8 44%,#1d5b83 100%);
      background-size:cover;
      background-position:center;
      box-shadow:0 18px 44px rgba(17,22,28,.14);
    }
    .feature-card:nth-child(2){background:linear-gradient(to top,rgba(0,0,0,.7),rgba(0,0,0,.04) 62%),linear-gradient(135deg,#132340 0%,#266e82 45%,#912fc4 100%)}
    .feature-card:nth-child(3){background:linear-gradient(to top,rgba(0,0,0,.7),rgba(0,0,0,.04) 62%),linear-gradient(135deg,#1c6f8e 0%,#e6a156 45%,#40302b 100%)}
    .reason{
      position:absolute;
      top:12px;
      left:12px;
      border-radius:999px;
      padding:6px 9px;
      background:rgba(255,255,255,.84);
      color:#111;
      font-size:11px;
      font-weight:900;
    }
    .feature-copy{
      position:absolute;
      left:16px;
      right:16px;
      bottom:16px;
    }
    .feature-copy h3{font-size:22px;letter-spacing:-.05em}
    .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
    .meta span{
      border-radius:999px;
      padding:5px 8px;
      background:rgba(255,255,255,.8);
      color:#111;
      font-size:11px;
      font-weight:900;
    }

    .content-band{
      width:min(1180px,calc(100% - 36px));
      margin:0 auto 28px;
      border-radius:32px;
      background:rgba(255,255,255,.58);
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.74);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .type-bar{
      display:flex;
      gap:8px;
      overflow-x:auto;
      padding:18px 18px 0;
    }
    .type-pill{
      flex:0 0 auto;
      border-radius:999px;
      padding:10px 15px;
      background:#fff;
      color:#59616b;
      font-size:13px;
      font-weight:800;
      box-shadow:0 8px 20px rgba(56,74,94,.07);
    }
    .type-pill.active{background:#111;color:#fff}
    .all-section{padding:26px 18px 22px}
    .all-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:20px;
      margin-bottom:16px;
    }
    .all-head h2{
      font-size:34px;
      line-height:1;
      letter-spacing:-.055em;
    }
    .all-head p{font-size:13px;color:var(--muted);line-height:1.6;max-width:390px}
    .destination-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
    }
    .destination-card{
      min-height:142px;
      border-radius:22px;
      position:relative;
      overflow:hidden;
      background:
        linear-gradient(to top,rgba(0,0,0,.72),rgba(0,0,0,.04) 62%),
        linear-gradient(135deg,#b8653c 0%,#e1a35f 42%,#482719 100%);
      background-size:cover;
      background-position:center;
      color:#fff;
      box-shadow:0 14px 34px rgba(17,22,28,.12);
    }
    .destination-card:nth-child(2){background:linear-gradient(to top,rgba(0,0,0,.72),rgba(0,0,0,.04) 62%),linear-gradient(135deg,#17324b 0%,#6f5137 46%,#15191f 100%)}
    .destination-card:nth-child(3){background:linear-gradient(to top,rgba(0,0,0,.72),rgba(0,0,0,.04) 62%),linear-gradient(135deg,#8fc7de 0%,#f6efe8 44%,#1d5b83 100%)}
    .destination-card:nth-child(4){background:linear-gradient(to top,rgba(0,0,0,.72),rgba(0,0,0,.04) 62%),linear-gradient(135deg,#1c6f8e 0%,#e6a156 45%,#40302b 100%)}
    .destination-card b{
      position:absolute;
      left:14px;
      bottom:36px;
      font-size:18px;
      letter-spacing:-.04em;
    }
    .destination-card small{
      position:absolute;
      left:14px;
      bottom:15px;
      color:rgba(255,255,255,.72);
      font-size:12px;
    }
    .bottom-nav{
      position:fixed;
      left:18px;
      right:18px;
      bottom:calc(env(safe-area-inset-bottom,0px) + 14px);
      z-index:110;
      min-height:70px;
      border-radius:24px;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(30px);
      -webkit-backdrop-filter:blur(30px);
      border:1px solid rgba(255,255,255,.78);
      box-shadow:0 18px 54px rgba(32,42,52,.16),0 1px 0 rgba(255,255,255,.9) inset;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
    }
    .month-current{
      min-width:160px;
      text-align:center;
      font-size:18px;
      font-weight:900;
      letter-spacing:-.04em;
    }
    .month-current span{
      display:block;
      margin-top:3px;
      font-size:10px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#89909a;
    }
    .nav-arrow{
      width:42px;
      height:42px;
      border-radius:15px;
      background:#fff;
      box-shadow:0 8px 20px rgba(56,74,94,.08);
      font-size:22px;
      color:#59616b;
    }
    .sheet{
      position:fixed;
      inset:auto 18px calc(env(safe-area-inset-bottom,0px) + 96px);
      z-index:130;
      max-width:420px;
      margin:auto;
      border-radius:28px;
      background:rgba(251,252,253,.92);
      backdrop-filter:blur(30px);
      -webkit-backdrop-filter:blur(30px);
      box-shadow:0 24px 80px rgba(18,24,30,.18);
      border:1px solid rgba(255,255,255,.78);
      padding:18px;
      display:none;
    }
    .sheet.preview{display:block;right:18px;left:auto;bottom:122px;width:360px}
    .sheet h2{font-size:24px;letter-spacing:-.05em}
    .sheet p{margin-top:8px;color:var(--muted);font-size:13px;line-height:1.65}
    .modal-backdrop{
      position:fixed;
      inset:0;
      z-index:180;
      background:rgba(17,19,22,.42);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }
    .detail-modal{
      position:fixed;
      z-index:181;
      left:50%;
      top:50%;
      width:min(920px,calc(100% - 28px));
      height:min(760px,calc(100vh - 34px));
      transform:translate(-50%,-50%);
      display:grid;
      grid-template-columns:minmax(300px,.95fr) minmax(0,1.05fr);
      grid-template-rows:1fr;
      overflow:hidden;
      border-radius:34px;
      background:rgba(251,252,253,.94);
      backdrop-filter:blur(30px);
      -webkit-backdrop-filter:blur(30px);
      box-shadow:0 38px 130px rgba(18,24,30,.34),0 1px 0 rgba(255,255,255,.9) inset;
      border:1px solid rgba(255,255,255,.78);
    }
    .detail-media{
      min-height:520px;
      position:relative;
      color:#fff;
      background-size:cover;
      background-position:center;
    }
    .detail-media::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(to top,rgba(0,0,0,.78),rgba(0,0,0,.06) 62%);
    }
    .detail-media-copy{
      position:absolute;
      left:26px;
      right:26px;
      bottom:28px;
      z-index:1;
    }
    .detail-media h2{
      margin-top:12px;
      font-size:48px;
      line-height:.92;
      letter-spacing:-.065em;
    }
    .detail-content{
      padding:28px;
      overflow-y:auto;
      min-height:0;
    }
    .modal-close,.modal-fav{
      position:absolute;
      top:18px;
      width:42px;
      height:42px;
      border-radius:15px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.74);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      z-index:2;
      color:#111;
      font-weight:900;
      box-shadow:0 10px 26px rgba(18,24,30,.12);
    }
    .modal-close{left:18px}
    .modal-fav{right:18px;color:#b84b4b}
    .highlight-pill{
      display:inline-flex;
      border-radius:999px;
      padding:8px 13px;
      background:#fff;
      color:#8a5a2d;
      font-size:13px;
      font-weight:900;
      box-shadow:0 10px 26px rgba(56,74,94,.08);
    }
    .stat-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:18px 0 24px;
    }
    .stat-row span{
      border-radius:999px;
      padding:7px 10px;
      background:#f0f3f5;
      color:#505963;
      font-size:12px;
      font-weight:900;
    }
    .detail-section{margin-top:24px}
    .detail-section h3{
      font-size:11px;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:#8b929a;
      font-weight:900;
      margin-bottom:12px;
    }
    .detail-section p{
      color:#4d565f;
      font-size:14px;
      line-height:1.85;
    }
    .experience{
      display:grid;
      grid-template-columns:34px 1fr;
      gap:12px;
      padding:13px 0;
      border-bottom:1px solid var(--line);
    }
    .experience-num{
      font-family:Georgia,"Times New Roman",serif;
      color:#c5ad8a;
      font-size:22px;
      font-weight:700;
      line-height:1;
    }
    .experience b{display:block;font-size:14px;margin-bottom:4px}
    .experience small{color:#69717a;font-size:12px;line-height:1.55}


    .status-box{margin-top:14px;border:1px solid rgba(38,42,48,.12);border-radius:18px;padding:16px;background:#f7f5ef}
    .status-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid rgba(38,42,48,.08)}
    .status-row:last-child{border-bottom:0}
    .status-row b{font-size:13px;color:#20242a}
    .status-row span{font-size:12px;color:#68717a;text-align:right;line-height:1.45}
    .status-chip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 10px;background:#eef5f1;color:#2e7c56;font-size:12px;font-weight:700}
    .status-chip.warn{background:#fff5e6;color:#9a6715}
    .status-chip.muted{background:#f0f2f4;color:#68717b}
    .verify-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px}
    .verify-note{font-size:12px;color:#6b727b;line-height:1.6;margin-top:10px}
    .search-field{width:100%;border:1px solid rgba(38,42,48,.12);border-radius:14px;padding:12px 14px;font-size:15px;background:#fff;color:#1e2329;outline:none}
    .overlay-sheet{position:fixed;left:50%;bottom:112px;transform:translateX(-50%);z-index:35;width:min(720px,calc(100vw - 28px));max-height:min(560px,72vh);overflow:auto;background:rgba(255,255,255,.94);backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.8);border-radius:28px;box-shadow:0 28px 90px rgba(24,30,40,.24);padding:20px}
    .overlay-sheet .sheet-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    .overlay-sheet .sheet-top h2{font-size:24px;margin:0}
    .result-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px}
    .mini-result{border:1px solid rgba(38,42,48,.1);border-radius:18px;background:#fff;padding:14px;text-align:left;color:#20242a;min-height:108px;cursor:pointer}
    .mini-result b{display:block;font-size:15px;margin-bottom:7px}
    .mini-result span{display:block;color:#68717a;font-size:12px;line-height:1.55}
    .empty-copy{color:#68717a;font-size:13px;line-height:1.65;margin:8px 0 0}

    @media(max-width:860px){
      .hero{padding-left:12px;padding-right:12px;overflow-x:hidden}
      .brand-row{padding-right:100px}
      .hero-grid{grid-template-columns:1fr;gap:14px;width:100%;max-width:100%}
      .planner-column{min-width:0}
      .glass-panel{min-width:0}
      .cover-card{min-height:430px}
      .planner-column{gap:14px}
      .featured-grid{display:flex;overflow-x:auto}
      .feature-card{flex:0 0 76vw}
      .content-band{width:calc(100% - 24px);border-radius:28px}
      .all-head{display:block}
      .all-head p{margin-top:8px}
      .destination-grid{grid-template-columns:1fr 1fr}
      .sheet.preview{display:none}
      .detail-modal{
        top:auto;bottom:0;left:0;right:0;
        width:100%;max-width:100%;max-height:92vh;
        transform:none;border-radius:28px 28px 0 0;
        display:flex;flex-direction:column;overflow:hidden;
      }
      .detail-media{min-height:260px;flex-shrink:0}
      .detail-content{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding:20px}
      .stat-row{gap:6px}
      .stat-row span{padding:5px 8px;font-size:11px}
      .result-list{grid-template-columns:1fr}
      .overlay-sheet{bottom:98px}
    }
  .credits-link{position:fixed;left:14px;bottom:12px;z-index:60;font-size:11px;color:#9aa1a9;text-decoration:none;opacity:.75}.credits-link:hover{opacity:1;text-decoration:underline}
  </style>
</head>
<body>
<div id="root"></div>
<script src="assets/js/react.production.min.js"></script>
<script src="assets/js/react-dom.production.min.js"></script>
<script src="assets/js/app.js"></script>
<a class="credits-link" href="credits.html" target="_blank">图片来源与版权</a>
</body>
</html>
